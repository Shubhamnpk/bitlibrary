<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" role="img" aria-labelledby="title desc">
  <title id="title">Water molecule structure</title>
  <desc id="desc">A simple structural diagram for H2O with oxygen bonded to two hydrogen atoms.</desc>
  <rect width="520" height="320" rx="24" fill="#f8fafc"/>
  <g stroke="#334155" stroke-width="16" stroke-linecap="round">
    <line x1="250" y1="156" x2="150" y2="232"/>
    <line x1="270" y1="156" x2="370" y2="232"/>
  </g>
  <circle cx="260" cy="132" r="70" fill="#ef4444"/>
  <circle cx="130" cy="246" r="48" fill="#e2e8f0" stroke="#94a3b8" stroke-width="5"/>
  <circle cx="390" cy="246" r="48" fill="#e2e8f0" stroke="#94a3b8" stroke-width="5"/>
  <text x="260" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="#fff">O</text>
  <text x="130" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#334155">H</text>
  <text x="390" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#334155">H</text>
  <text x="260" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">H2O</text>
</svg>
